name: Docker

# Guards NFR1 (the auto-fail rubric item) on the way into main only —
# a full image build plus cold-start smoke test is too slow to run on
# every push to develop.
on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-smoke-test:
    name: Cold start via docker compose
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env from example
        run: |
          cp .env.example .env
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=ci-test-secret|" .env
          # Deliberately left as the placeholder: the seed treats "changeme"
          # as "no key" and skips TMDB entirely. None of the smoke tests below
          # touch a TMDB-backed route, so a real key would only add ten
          # failing network calls to container boot.
          sed -i "s|^TMDB_API_KEY=.*|TMDB_API_KEY=changeme|" .env
          cat .env

      - name: Build and start the stack
        run: docker compose up -d --build

      - name: Wait for the API to report healthy
        run: |
          api_container="$(docker compose ps -q api)"

          if [ -z "$api_container" ]; then
            echo "No api container was created."
            docker compose ps -a
            exit 1
          fi

          for attempt in $(seq 1 30); do
            state=$(docker inspect --format='{{.State.Status}}' "$api_container")
            health=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$api_container")
            echo "attempt ${attempt}: state=${state} health=${health}"

            if [ "$health" = "healthy" ]; then
              exit 0
            fi

            # Fail fast rather than polling a container that has already died.
            if [ "$state" = "exited" ] || [ "$state" = "dead" ]; then
              echo "API container exited before becoming healthy."
              exit 1
            fi

            sleep 10
          done

          echo "API never became healthy within the timeout."
          exit 1

      - name: Smoke test — API health endpoint
        run: |
          curl --fail --silent --show-error http://localhost:4000/health | tee /dev/stderr | grep -q '"status":"ok"'

      - name: Smoke test — migrations applied
        run: |
          # A successful register proves the schema actually exists, i.e.
          # `prisma migrate deploy` ran on boot rather than silently skipping.
          curl --fail --silent --show-error \
            -X POST http://localhost:4000/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"ci-smoke@example.com","password":"Password123!"}' \
            | grep -q 'ci-smoke@example.com'

      - name: Smoke test — seeded demo account can log in
        run: |
          # Proves the seed ran, not just the migrations.
          curl --fail --silent --show-error \
            -X POST http://localhost:4000/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"demo@example.com","password":"Password123!"}' \
            | grep -q 'accessToken'

      - name: Wait for the web service to respond
        run: |
          for attempt in $(seq 1 18); do
            if curl --fail --silent --output /dev/null http://localhost:3000/login; then
              echo "web is serving"
              exit 0
            fi
            echo "attempt ${attempt}: web not ready yet"
            sleep 5
          done
          echo "Web service never responded."
          docker compose ps -a
          exit 1

      - name: Smoke test — cold start reaches the login page
        run: |
          # Unauthenticated root request should be redirected to /login by
          # the Next.js middleware and render the login screen (E1-S3 AC).
          curl --fail --silent --show-error --location http://localhost:3000/ | grep -qi 'log in'

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "===== docker compose ps ====="
          docker compose ps -a
          echo "===== logs ====="
          docker compose logs --no-color --tail 200

      - name: Tear down
        if: always()
        run: docker compose down --volumes --remove-orphans
