name: Docker

# Guards NFR1 (the auto-fail rubric item) on the way into main only —
# a full image build plus cold-start smoke test is too slow to run on
# every push to develop.
on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-smoke-test:
    name: Cold start via docker compose
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env from example
        run: |
          cp .env.example .env
          # Overwrite the placeholder secrets. TMDB_API_KEY falls back to a
          # dummy because the smoke test never reaches a TMDB-backed route
          # (they all sit behind the JWT guard from E2-S2).
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=ci-test-secret|" .env
          sed -i "s|^TMDB_API_KEY=.*|TMDB_API_KEY=${{ secrets.TMDB_API_KEY || 'ci-dummy-key' }}|" .env

      - name: Build and start the stack
        run: docker compose up -d --build

      - name: Wait for the API to report healthy
        run: |
          for attempt in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' \
              "$(docker compose ps -q api)" 2>/dev/null || echo "starting")
            echo "attempt ${attempt}: api is ${status}"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "API never became healthy"
          exit 1

      - name: Smoke test — API health endpoint
        run: |
          curl --fail --silent --show-error http://localhost:4000/health | tee /dev/stderr | grep -q '"status":"ok"'

      - name: Smoke test — migrations applied
        run: |
          # A successful register proves the schema actually exists, i.e.
          # `prisma migrate deploy` ran on boot rather than silently skipping.
          curl --fail --silent --show-error \
            -X POST http://localhost:4000/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"ci-smoke@example.com","password":"Password123!"}' \
            | grep -q 'ci-smoke@example.com'

      - name: Smoke test — cold start reaches the login page
        run: |
          # Unauthenticated root request should be redirected to /login by
          # the Next.js middleware and render the login screen (E1-S3 AC).
          curl --fail --silent --show-error --location http://localhost:3000/ | grep -qi 'log in'

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down --volumes --remove-orphans
